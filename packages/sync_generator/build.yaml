targets:
  $default:
    builders:
      sync_generator|sync_model:
        generate_for:
          include:
            - lib/**.dart

builders:
  sync_model:
    import: "package:sync_generator/sync_generator.dart"
    builder_factories: ["syncModelBuilder"]
    build_extensions: { ".dart": ["sync_generator.g.dart"] }
    auto_apply: dependents
    build_to: cache
    applies_builders: ["source_gen|combining_builder"]
